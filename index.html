<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能飲食追蹤 (Gemini 實作版)</title>
    <style>
        :root {
            --primary: #4CAF50;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333;
            --error: #f44336;
        }

        body {
            font-family: 'Segoe UI', 'Noto Sans TC', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 50px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        h1,
        h2,
        h3 {
            color: var(--primary);
            text-align: center;
            margin-top: 0;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.9em;
        }

        input,
        select,
        textarea,
        button {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 16px;
            /* 防止 iOS input 放大 */
        }

        textarea {
            resize: none;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        button:disabled {
            background-color: #a5d6a7;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-box {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box.over {
            background: #ffebee;
        }

        .stat-box.over span {
            color: var(--error);
        }

        .stat-box span {
            display: block;
            font-size: 1.3em;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 4px;
            display: block;
        }

        /* 飲食紀錄列表樣式 */
        #meal-list {
            list-style: none;
            padding: 0;
            margin-top: 10px;
        }

        #meal-list li {
            background: #f9f9f9;
            border-bottom: 1px solid #eee;
            padding: 10px;
            font-size: 0.9em;
        }

        .meal-time {
            color: #888;
            font-size: 0.8em;
            margin-right: 5px;
        }

        /* 全域載入遮罩 */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <p style="color: var(--primary); font-weight: bold;">Gemini 正在用力分析中...</p>
    </div>

    <div id="setup-section" class="card">
        <h2>建立你的專屬計畫</h2>
        <p style="font-size: 0.8em; color: #666; text-align:center;">我們將以此計算你的 TDEE 與目標</p>
        <form id="setup-form">
            <label>性別</label>
            <select id="gender" required>
                <option value="M">男</option>
                <option value="F">女</option>
            </select>
            <div class="grid-2">
                <div><label>年齡 (歲)</label><input type="number" id="age" placeholder="例如: 25" required></div>
                <div><label>身高 (cm)</label><input type="number" id="height" placeholder="例如: 170" required></div>
            </div>
            <label>目前體重 (kg)</label>
            <input type="number" id="weight" step="0.1" placeholder="例如: 65.5" required>
            <label>每週運動次數 (活動係數)</label>
            <select id="activity" required>
                <option value="1.2">幾乎不運動 (久坐)</option>
                <option value="1.375">輕度運動 (1-3次/週)</option>
                <option value="1.55">中度運動 (3-5次/週)</option>
                <option value="1.725">高度運動 (6-7次/週)</option>
            </select>
            <label>目標體重 (kg)</label>
            <input type="number" id="target-weight" step="0.1" required>
            <label>期望達成日期</label>
            <input type="date" id="target-date" required>
            <button type="submit">開始我的健康旅程</button>
        </form>
    </div>

    <div id="dashboard-section" class="card hidden">
        <h2>今日攝取狀態</h2>
        <div class="grid-2">
            <div class="stat-box" id="box-cal">
                <span class="stat-label">剩餘 / 目標熱量 (kcal)</span>
                <span id="remain-calories">0</span> / <span id="display-calories"
                    style="display:inline; font-size: 1em; color: #666;">0</span>
            </div>
            <div class="stat-box"><span class="stat-label">碳水化合物目標 (g)</span><span id="display-carbs">0</span></div>
            <div class="stat-box"><span class="stat-label">蛋白質目標 (g)</span><span id="display-protein">0</span></div>
            <div class="stat-box"><span class="stat-label">脂肪目標 (g)</span><span id="display-fat">0</span></div>
            <div class="stat-box"><span class="stat-label">建議飲水量 (ml)</span><span id="display-water">0</span></div>
            <div class="stat-box"><span class="stat-label">建議步數 (步)</span><span id="display-steps">0</span></div>
        </div>

        <h3 style="margin-top: 25px;">新增飲食紀錄 (拍照+備註)</h3>
        <form id="meal-form">
            <label>餐點照片 (必填)</label>
            <input type="file" id="meal-photo" accept="image/*" required>
            <label>備註描述 (選填，更準確)</label>
            <textarea id="meal-notes" rows="2" placeholder="例如：飯一半、去冰微糖、大碗..."></textarea>
            <button type="submit" id="submit-meal-btn">透過 Gemini AI 分析</button>
        </form>

        <h3 style="margin-top: 25px;">今日飲食明細</h3>
        <ul id="meal-list">
        </ul>

        <div id="diet-advice" class="stat-box" style="margin-top: 15px; background: #fff3e0; text-align: left;">
            <strong>💡 小奈的飲食建議：</strong><br>
            <span id="advice-text">尚未有紀錄，趕快吃點健康的食物吧！</span>
        </div>

        <button id="reset-btn" style="background-color: #9e9e9e; margin-top: 30px;">重新設定計畫 / 14天回報</button>
    </div>

    <script>
        // === [設定區] ===
        // 請在此處填入你的 Google AI Studio API Key
        const GEMINI_API_KEY = "AIzaSyBVbEcw2vPQrbvGZtpp9FG3_q22UVRDVoo";
        // ===============

        // DOM 元素
        const setupSection = document.getElementById('setup-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const setupForm = document.getElementById('setup-form');
        const mealForm = document.getElementById('meal-form');
        const loadingOverlay = document.getElementById('loading-overlay');

        // 使用者資料與今日累計資料 (加上日期鎖定，隔天自動重置)
        const todayStr = new Date().toISOString().slice(0, 10);
        let userData = JSON.parse(localStorage.getItem('diet_userData')) || null;
        let storedIntake = JSON.parse(localStorage.getItem('diet_todayIntake')) || { date: todayStr, calories: 0, carbs: 0, protein: 0, fat: 0, meals: [] };

        // 如果 localStorage 的紀錄是舊的，就重置
        if (storedIntake.date !== todayStr) {
            storedIntake = { date: todayStr, calories: 0, carbs: 0, protein: 0, fat: 0, meals: [] };
            localStorage.setItem('diet_todayIntake', JSON.stringify(storedIntake));
        }
        let todayIntake = storedIntake;

        // 初始化檢查
        if (userData) {
            setupSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            updateDashboard();
        }

        // --- 功能 1: 初始資料設定與 TDEE 計算 ---
        setupForm.addEventListener('submit', function (e) {
            e.preventDefault();

            if (!GEMINI_API_KEY) { alert("請先在程式碼中填入 Gemini API Key！"); return; }

            const gender = document.getElementById('gender').value;
            const age = parseInt(document.getElementById('age').value);
            const height = parseInt(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const activity = parseFloat(document.getElementById('activity').value);
            const targetWeight = parseFloat(document.getElementById('target-weight').value);
            const targetDate = new Date(document.getElementById('target-date').value);
            const today = new Date();

            const daysDiff = Math.ceil((targetDate - today) / (1000 * 60 * 60 * 24));
            if (daysDiff <= 0) { alert("目標日期必須在未來喔！"); return; }

            // 計算 BMR (Mifflin-St Jeor)
            let bmr = (10 * weight) + (6.25 * height) - (5 * age);
            bmr += (gender === 'M') ? 5 : -161;

            // 計算 TDEE
            const tdee = bmr * activity;

            // 計算熱量赤字 (預估)
            const weightDiff = weight - targetWeight;
            const totalDeficitNeeded = weightDiff * 7700; // 1kg fat approx 7700kcal
            const dailyDeficit = weightDiff > 0 ? (totalDeficitNeeded / daysDiff) : 0;

            // 每日目標熱量
            let dailyCalories = Math.round(tdee - dailyDeficit);
            if (gender === 'F' && dailyCalories < 1200) dailyCalories = 1200; // 女性安全底線
            if (gender === 'M' && dailyCalories < 1500) dailyCalories = 1500; // 男性安全底線

            // 營養素分配 (碳水 45%, 蛋白質 25%, 脂肪 30%) - 稍微調整更適合大眾減脂
            const carbs = Math.round((dailyCalories * 0.45) / 4);
            const protein = Math.round((dailyCalories * 0.25) / 4);
            const fat = Math.round((dailyCalories * 0.30) / 9);
            const water = Math.round(weight * 35);
            const steps = activity <= 1.375 ? 8000 : 12000;

            userData = { dailyCalories, carbs, protein, fat, water, steps, initWeight: weight, targetWeight };
            localStorage.setItem('diet_userData', JSON.stringify(userData));

            setupSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            updateDashboard();
        });

        // --- 功能 2: 更新儀表板 UI ---
        function updateDashboard() {
            const remainCal = userData.dailyCalories - todayIntake.calories;

            document.getElementById('display-calories').innerText = userData.dailyCalories;
            document.getElementById('remain-calories').innerText = remainCal;
            document.getElementById('display-carbs').innerText = userData.carbs;
            document.getElementById('display-protein').innerText = userData.protein;
            document.getElementById('display-fat').innerText = userData.fat;
            document.getElementById('display-water').innerText = userData.water;
            document.getElementById('display-steps').innerText = userData.steps;

            // 熱量爆表變色
            if (remainCal < 0) {
                document.getElementById('box-cal').classList.add('over');
            } else {
                document.getElementById('box-cal').classList.remove('over');
            }

            // 更新飲食清單
            const mealList = document.getElementById('meal-list');
            mealList.innerHTML = '';
            if (todayIntake.meals.length === 0) {
                mealList.innerHTML = '<li style="text-align:center; color:#999;">今日尚無紀錄</li>';
            } else {
                todayIntake.meals.forEach(meal => {
                    const li = document.createElement('li');
                    const timeStr = meal.time || "";
                    li.innerHTML = `<span class="meal-time">${timeStr}</span> <strong>${meal.aiDescr}</strong> <br> (備註: ${meal.userNotes}) <br> 
                                    <span style="color:var(--primary); font-weight:bold;">${meal.calories} kcal</span> | 碳:${meal.carbs}g | 蛋:${meal.protein}g | 脂:${meal.fat}g`;
                    mealList.appendChild(li);
                });
            }

            generateAdvice();
        }

        // --- 功能 3: 圖片轉 Base64 輔助函式 ---
        function fileToGenerativePart(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve({
                    inlineData: {
                        data: reader.result.split(',')[1],
                        mimeType: file.type
                    },
                });
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // --- 功能 4: 呼叫真實 Gemini API 並處理結果 ---
        mealForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            if (!GEMINI_API_KEY) { alert("請先填入 API Key"); return; }
            const photoFile = document.getElementById('meal-photo').files[0];
            const userNotes = document.getElementById('meal-notes').value || "無特別備註";

            if (!photoFile) { alert("請選擇餐點照片"); return; }

            loadingOverlay.classList.remove('hidden'); // 顯示載入遮罩

            try {
                // 1. 準備圖片資料
                const imagePart = await fileToGenerativePart(photoFile);

                // 2. 建立專門針對營養分析的 Prompt
                const prompt = `你是一位專業的營養師。請分析這張圖片中的食物，並參考使用者的備註：「${userNotes}」。
                請估算這頓餐點的熱量(kcal)以及三大營養素：碳水化合物(g)、蛋白質(g)、脂肪(g)。
                
                請務必以嚴格的 JSON 格式回傳，不要包含任何 Markdown 標記 (如 \`\`\`json) 或其他文字。
                JSON 格式範例：
                {"mealDescription": "辨識出的食物簡短名稱", "calories": 500, "carbs": 60, "protein": 20, "fat": 20}
                
                如果圖片內容顯然不是食物，請回傳：
                {"error": "無法辨識為食物"}
                `;

                // 3. 呼叫 Gemini Pro Vision API (或最新的 gemini-1.5-flash)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, imagePart] }]
                    })
                });

                const data = await response.json();

                // 4. 解析 API 回傳的文字
                if (!data.candidates || data.candidates.length === 0) throw new Error("API 無回傳內容");

                const responseText = data.candidates[0].content.parts[0].text.trim();

                // 5. 將 JSON 字串轉為 JS 物件
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (jsonErr) {
                    console.error("JSON 解析失敗:", responseText);
                    throw new Error("AI 回傳格式異常，請重試");
                }

                // 6. 處理錯誤或更新資料
                if (result.error) {
                    alert("Gemini 說：" + result.error);
                } else {
                    const now = new Date();
                    const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

                    // 新增到紀錄
                    const newMeal = {
                        time: timeStr,
                        userNotes: userNotes,
                        aiDescr: result.mealDescription,
                        calories: parseInt(result.calories) || 0,
                        carbs: parseInt(result.carbs) || 0,
                        protein: parseInt(result.protein) || 0,
                        fat: parseInt(result.fat) || 0
                    };

                    todayIntake.meals.push(newMeal);
                    todayIntake.calories += newMeal.calories;
                    todayIntake.carbs += newMeal.carbs;
                    todayIntake.protein += newMeal.protein;
                    todayIntake.fat += newMeal.fat;

                    localStorage.setItem('diet_todayIntake', JSON.stringify(todayIntake));
                    updateDashboard();
                    mealForm.reset(); // 清空表單
                }

            } catch (error) {
                console.error("發生錯誤:", error);
                alert("分析失敗: " + error.message);
            } finally {
                loadingOverlay.classList.add('hidden'); // 隱藏載入遮罩
            }
        });

        // --- 功能 5: 動態飲食建議 ---
        function generateAdvice() {
            const adviceEl = document.getElementById('advice-text');
            const remainCal = userData.dailyCalories - todayIntake.calories;

            // 簡單的邏輯判斷
            if (todayIntake.meals.length === 0) {
                adviceEl.innerText = "美好的開始！記得攝取足夠的水分和蛋白質喔。";
                return;
            }

            let advice = "";
            if (remainCal < -100) {
                advice = `今日熱量攝取已超標 ${Math.abs(remainCal)} kcal。建議接下來的餐點選擇清淡、高纖維的食物，並多走路消耗熱量。`;
            } else if (remainCal >= 0 && remainCal < 300) {
                advice = `熱量額度快用完囉（剩餘 ${remainCal} kcal）。若還要進食，建議選擇小份量的純蛋白質食物（如蛋白、干貝）。`;
            } else {
                // 檢查蛋白質是否足夠 (假設目標的 80% 為及格)
                if (todayIntake.protein < (userData.protein * 0.8)) {
                    advice = `你還有 ${remainCal} kcal 額度。目前蛋白質攝取偏少，下一餐建議補充雞胸肉、魚類、豆製品或蛋。`;
                } else {
                    advice = `目前的飲食節奏不錯，剩餘熱量 ${remainCal} kcal。繼續保持，記得也要補充蔬菜喔！`;
                }
            }
            adviceEl.innerText = advice;
        }

        // 重置計畫 / 14天回報
        document.getElementById('reset-btn').addEventListener('click', () => {
            if (confirm('要重新設定計畫，或進行「14天體重回報與調整」嗎？(目前的紀錄將會清除)')) {
                localStorage.removeItem('diet_userData');
                localStorage.removeItem('diet_todayIntake');
                location.reload();
            }
        });
    </script>
</body>

</html>
