<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能飲食追蹤 (深色寶寶藍版)</title>
    <style>
        :root {
            /* 主色系：寶寶藍與深色模式 */
            --primary: #89CFF0;
            --primary-hover: #6CB4D4;
            --bg: #121212;
            --card-bg: #1E1E1E;
            --text: #E0E0E0;
            --text-muted: #9E9E9E;
            --input-bg: #2C2C2C;
            --border: #444444;
            --error: #FF6B6B;
            --box-bg: #25333A;
            /* 帶一點藍的深灰，呼應寶寶藍 */
            --advice-bg: #1A262E;
        }

        body {
            font-family: 'Segoe UI', 'Noto Sans TC', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 50px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        h1,
        h2,
        h3 {
            color: var(--primary);
            text-align: center;
            margin-top: 0;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.9em;
            color: var(--text-muted);
        }

        input,
        select,
        textarea,
        button {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-sizing: border-box;
            font-size: 16px;
            background-color: var(--input-bg);
            color: var(--text);
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* 讓 input[type="file"] 在深色模式好看一點 */
        input[type="file"]::file-selector-button {
            background-color: var(--primary);
            color: #121212;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
        }

        textarea {
            resize: none;
        }

        button {
            background-color: var(--primary);
            color: #121212;
            /* 按鈕文字用深色，對比度更好 */
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #4A6E7D;
            cursor: not-allowed;
            color: #888;
        }

        .hidden {
            display: none;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-box {
            background: var(--box-bg);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #2A3B45;
        }

        .stat-box.over {
            background: rgba(255, 107, 107, 0.1);
            border-color: var(--error);
        }

        .stat-box.over span {
            color: var(--error);
        }

        .stat-box span {
            display: block;
            font-size: 1.3em;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8em;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: block;
        }

        #meal-list {
            list-style: none;
            padding: 0;
            margin-top: 10px;
        }

        #meal-list li {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .meal-time {
            color: var(--primary);
            font-size: 0.8em;
            margin-right: 5px;
            font-weight: bold;
        }

        /* 全域載入遮罩 */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 18, 18, 0.85);
            /* 半透明深色遮罩 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            backdrop-filter: blur(3px);
        }

        .spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <p style="color: var(--primary); font-weight: bold; margin-top: 15px;">小奈正在用心分析中...</p>
    </div>

    <div id="setup-section" class="card">
        <h2>建立專屬計畫</h2>
        <form id="setup-form">
            <label>性別</label>
            <select id="gender" required>
                <option value="M">男</option>
                <option value="F">女</option>
            </select>
            <div class="grid-2">
                <div><label>年齡 (歲)</label><input type="number" id="age" required></div>
                <div><label>身高 (cm)</label><input type="number" id="height" required></div>
            </div>
            <label>目前體重 (kg)</label>
            <input type="number" id="weight" step="0.1" required>
            <label>每週運動次數</label>
            <select id="activity" required>
                <option value="1.2">幾乎不運動 (0次)</option>
                <option value="1.375">輕度運動 (1-3次)</option>
                <option value="1.55">中度運動 (3-5次)</option>
                <option value="1.725">高度運動 (6-7次)</option>
            </select>
            <label>目標體重 (kg)</label>
            <input type="number" id="target-weight" step="0.1" required>
            <label>期望達成日期</label>
            <input type="date" id="target-date" required>
            <button type="submit">開始我的健康旅程</button>
        </form>
    </div>

    <div id="dashboard-section" class="card hidden">
        <h2>今日攝取狀態</h2>
        <div class="grid-2">
            <div class="stat-box" id="box-cal">
                <span class="stat-label">剩餘 / 目標熱量 (kcal)</span>
                <span id="remain-calories">0</span> <span id="display-calories"
                    style="display:inline; font-size: 0.8em; color: var(--text-muted);">/ 0</span>
            </div>
            <div class="stat-box"><span class="stat-label">碳水目標 (g)</span><span id="display-carbs">0</span></div>
            <div class="stat-box"><span class="stat-label">蛋白質目標 (g)</span><span id="display-protein">0</span></div>
            <div class="stat-box"><span class="stat-label">脂肪目標 (g)</span><span id="display-fat">0</span></div>
            <div class="stat-box"><span class="stat-label">建議飲水量 (ml)</span><span id="display-water">0</span></div>
            <div class="stat-box"><span class="stat-label">建議步數 (步)</span><span id="display-steps">0</span></div>
        </div>

        <h3 style="margin-top: 25px;">新增飲食紀錄</h3>
        <form id="meal-form">
            <label>餐點照片 (必填)</label>
            <input type="file" id="meal-photo" accept="image/*" required>
            <label>備註描述 (選填，更準確)</label>
            <textarea id="meal-notes" rows="2" placeholder="例如：飯一半、去冰微糖..."></textarea>
            <button type="submit" id="submit-meal-btn">上傳給小奈分析</button>
        </form>

        <h3 style="margin-top: 25px;">今日飲食明細</h3>
        <ul id="meal-list"></ul>

        <div id="diet-advice" class="stat-box"
            style="margin-top: 15px; background: var(--advice-bg); text-align: left; border-color: var(--primary);">
            <strong style="color: var(--primary);">💡 小奈的飲食建議：</strong><br>
            <span id="advice-text"
                style="color: var(--text); font-size: 0.9em; font-weight: normal;">尚未有紀錄，趕快吃點健康的食物吧！</span>
        </div>

        <button type="button" id="reset-btn"
            style="background-color: transparent; border: 1px solid var(--border); color: var(--text-muted); margin-top: 30px;">重新設定計畫
            / 14天回報</button>
    </div>

    <script>
        // === [設定區] ===
        const GEMINI_API_KEY = "AIzaSyBVbEcw2vPQrbvGZtpp9FG3_q22UVRDVoo"; // 請將 API Key 貼在引號內
        // ===============

        const setupSection = document.getElementById('setup-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const setupForm = document.getElementById('setup-form');
        const mealForm = document.getElementById('meal-form');
        const loadingOverlay = document.getElementById('loading-overlay');

        const todayStr = new Date().toISOString().slice(0, 10);
        let userData = JSON.parse(localStorage.getItem('diet_userData')) || null;
        let storedIntake = JSON.parse(localStorage.getItem('diet_todayIntake')) || { date: todayStr, calories: 0, carbs: 0, protein: 0, fat: 0, meals: [] };

        if (storedIntake.date !== todayStr) {
            storedIntake = { date: todayStr, calories: 0, carbs: 0, protein: 0, fat: 0, meals: [] };
            localStorage.setItem('diet_todayIntake', JSON.stringify(storedIntake));
        }
        let todayIntake = storedIntake;

        if (userData) {
            setupSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            updateDashboard();
        }

        setupForm.addEventListener('submit', function (e) {
            e.preventDefault();
            if (!GEMINI_API_KEY) { alert("請先填入 API Key！"); return; }

            const gender = document.getElementById('gender').value;
            const age = parseInt(document.getElementById('age').value);
            const height = parseInt(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const activity = parseFloat(document.getElementById('activity').value);
            const targetWeight = parseFloat(document.getElementById('target-weight').value);
            const targetDate = new Date(document.getElementById('target-date').value);
            const today = new Date();

            const daysDiff = Math.ceil((targetDate - today) / (1000 * 60 * 60 * 24));
            if (daysDiff <= 0) { alert("目標日期必須在未來喔！"); return; }

            let bmr = (10 * weight) + (6.25 * height) - (5 * age);
            bmr += (gender === 'M') ? 5 : -161;
            const tdee = bmr * activity;

            const weightDiff = weight - targetWeight;
            const totalDeficitNeeded = weightDiff * 7700;
            const dailyDeficit = weightDiff > 0 ? (totalDeficitNeeded / daysDiff) : 0;

            let dailyCalories = Math.round(tdee - dailyDeficit);
            if (gender === 'F' && dailyCalories < 1200) dailyCalories = 1200;
            if (gender === 'M' && dailyCalories < 1500) dailyCalories = 1500;

            const carbs = Math.round((dailyCalories * 0.45) / 4);
            const protein = Math.round((dailyCalories * 0.25) / 4);
            const fat = Math.round((dailyCalories * 0.30) / 9);
            const water = Math.round(weight * 35);
            const steps = activity <= 1.375 ? 8000 : 12000;

            userData = { dailyCalories, carbs, protein, fat, water, steps, initWeight: weight, targetWeight };
            localStorage.setItem('diet_userData', JSON.stringify(userData));

            setupSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            updateDashboard();
        });

        function updateDashboard() {
            const remainCal = userData.dailyCalories - todayIntake.calories;

            document.getElementById('display-calories').innerText = userData.dailyCalories;
            document.getElementById('remain-calories').innerText = remainCal;
            document.getElementById('display-carbs').innerText = userData.carbs;
            document.getElementById('display-protein').innerText = userData.protein;
            document.getElementById('display-fat').innerText = userData.fat;
            document.getElementById('display-water').innerText = userData.water;
            document.getElementById('display-steps').innerText = userData.steps;

            if (remainCal < 0) {
                document.getElementById('box-cal').classList.add('over');
            } else {
                document.getElementById('box-cal').classList.remove('over');
            }

            const mealList = document.getElementById('meal-list');
            mealList.innerHTML = '';
            if (todayIntake.meals.length === 0) {
                mealList.innerHTML = '<li style="text-align:center; border:none; color:var(--text-muted);">今日尚無紀錄</li>';
            } else {
                todayIntake.meals.forEach(meal => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span class="meal-time">${meal.time}</span> <strong>${meal.aiDescr}</strong> 
                                    <div style="color:var(--text-muted); font-size:0.85em; margin: 4px 0;">備註: ${meal.userNotes}</div> 
                                    <span style="color:var(--primary); font-weight:bold;">${meal.calories} kcal</span> | 碳:${meal.carbs}g | 蛋:${meal.protein}g | 脂:${meal.fat}g`;
                    mealList.appendChild(li);
                });
            }
            generateAdvice();
        }

        function fileToGenerativePart(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve({
                    inlineData: { data: reader.result.split(',')[1], mimeType: file.type }
                });
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        mealForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            if (!GEMINI_API_KEY) { alert("還沒填入 API Key 喔！"); return; }
            const photoFile = document.getElementById('meal-photo').files[0];
            const userNotes = document.getElementById('meal-notes').value || "無特別備註";

            if (!photoFile) { alert("請選擇餐點照片"); return; }

            loadingOverlay.classList.remove('hidden');

            try {
                const imagePart = await fileToGenerativePart(photoFile);
                const prompt = `你是一位專業的營養師。請分析這張圖片中的食物，並參考備註：「${userNotes}」。
                請估算這頓餐點的熱量(kcal)以及三大營養素：碳水化合物(g)、蛋白質(g)、脂肪(g)。
                請務必以嚴格的 JSON 格式回傳，不要包含任何 Markdown 標記 (如 \`\`\`json)。
                範例：{"mealDescription": "辨識結果", "calories": 500, "carbs": 60, "protein": 20, "fat": 20}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, imagePart] }] })
                });

                const data = await response.json();

                // 檢查 API 是否有回傳錯誤 (例如 Key 錯了或是權限問題)
                if (data.error) throw new Error(`API 錯誤: ${data.error.message}`);
                if (!data.candidates) throw new Error("API 沒有回傳預期的資料");

                let responseText = data.candidates[0].content.parts[0].text.trim();
                console.log("Gemini 原始回傳 (解析前):", responseText); // 開發者除錯用

                // 【關鍵修復】強制拔除 Markdown 的 ```json 與 ``` 標記
                responseText = responseText.replace(/```json/gi, '').replace(/```/gi, '').trim();

                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (jsonErr) {
                    console.error("JSON 解析失敗，過濾後的字串為:", responseText);
                    throw new Error("AI 回傳的格式有誤，請再試一次。");
                }

                if (result.error) {
                    alert("小奈說：" + result.error);
                } else {
                    const now = new Date();
                    const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

                    const newMeal = {
                        time: timeStr,
                        userNotes: userNotes,
                        aiDescr: result.mealDescription || "未知餐點",
                        calories: parseInt(result.calories) || 0,
                        carbs: parseInt(result.carbs) || 0,
                        protein: parseInt(result.protein) || 0,
                        fat: parseInt(result.fat) || 0
                    };

                    todayIntake.meals.push(newMeal);
                    todayIntake.calories += newMeal.calories;
                    todayIntake.carbs += newMeal.carbs;
                    todayIntake.protein += newMeal.protein;
                    todayIntake.fat += newMeal.fat;

                    localStorage.setItem('diet_todayIntake', JSON.stringify(todayIntake));
                    updateDashboard();
                    mealForm.reset();
                }

            } catch (error) {
                console.error("發生錯誤:", error);
                alert("分析失敗: " + error.message);
            } finally {
                loadingOverlay.classList.add('hidden'); // 確保無論成功失敗，遮罩一定會關掉
            }
        });

        function generateAdvice() {
            const adviceEl = document.getElementById('advice-text');
            const remainCal = userData.dailyCalories - todayIntake.calories;

            if (todayIntake.meals.length === 0) {
                adviceEl.innerText = "美好的開始！記得攝取足夠的水分和蛋白質喔。";
                return;
            }

            let advice = "";
            if (remainCal < -100) {
                advice = `今日熱量攝取已超標 ${Math.abs(remainCal)} kcal。建議接下來選擇清淡、高纖維的食物，並多散步消耗熱量。`;
            } else if (remainCal >= 0 && remainCal < 300) {
                advice = `熱量額度快用完囉（剩餘 ${remainCal} kcal）。若餓了建議選擇純蛋白質（如茶葉蛋）。`;
            } else {
                if (todayIntake.protein < (userData.protein * 0.8)) {
                    advice = `還有 ${remainCal} kcal。目前蛋白質偏少，下一餐建議補充雞胸肉、豆腐或無糖豆漿！`;
                } else {
                    advice = `目前的飲食節奏不錯，繼續保持！`;
                }
            }
            adviceEl.innerText = advice;
        }

        document.getElementById('reset-btn').addEventListener('click', () => {
            if (confirm('確定要重新設定計畫或進行 14 天回報嗎？目前的進度會被清除喔！')) {
                localStorage.removeItem('diet_userData');
                localStorage.removeItem('diet_todayIntake');
                location.reload();
            }
        });
    </script>
</body>

</html>
