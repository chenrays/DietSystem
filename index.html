<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>健康飲食追蹤</title>
<style>
:root{
  --blue-50:#EBF6FB;
  --blue-100:#C8E8F5;
  --blue-200:#A0D4EC;
  --blue-400:#5BAFD6;
  --blue-500:#3E9EC7;
  --blue-600:#2980B9;
  --blue-800:#1B4F72;
  --blue-900:#154360;
  --bg:#F4FAFD;
  --surface:#FFFFFF;
  --border:#C8E8F5;
  --border2:#A0D4EC;
  --txt:#1B3A4B;
  --txt2:#5F8EA0;
  --txt3:#9BBCCC;
  --card-bg:#FFFFFF;
  --sc-bg:#EBF6FB;
  --ring-track:#D6EEF8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--txt);min-height:100vh}
#app{max-width:500px;margin:0 auto;background:var(--surface);min-height:100vh}
.view{display:none;padding:16px 16px 88px}
.view.active{display:block}
#tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;position:sticky;top:0;z-index:10}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 11px;font-size:11px;color:var(--txt3);border:none;background:none;cursor:pointer;font-family:inherit;border-bottom:2.5px solid transparent;transition:color .15s}
.tb.on{color:var(--blue-600);font-weight:600;border-bottom-color:var(--blue-500)}
.ti{font-size:20px;line-height:1}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.slbl{font-size:11px;color:var(--txt2);font-weight:600;letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:13px;color:var(--txt2);margin-bottom:5px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:9px;font-size:15px;background:var(--surface);color:var(--txt);font-family:inherit;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--blue-500);box-shadow:0 0 0 3px rgba(91,175,214,0.15)}
textarea{resize:vertical}
.btn{width:100%;padding:12px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;margin-top:6px;transition:opacity .15s}
.bP{background:linear-gradient(135deg,var(--blue-500),var(--blue-600));color:#fff}
.bP:active{opacity:.85}
.bS{background:transparent;border:1px solid var(--border2);color:var(--blue-600)}
.bS:active{background:var(--blue-50)}
.pb{height:8px;background:var(--ring-track);border-radius:4px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:4px;transition:width .5s}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sc{background:var(--sc-bg);border-radius:10px;padding:11px 13px}
.sl{font-size:12px;color:var(--txt2);margin-bottom:3px}
.sv{font-size:20px;font-weight:600;color:var(--txt)}
.su{font-size:12px;color:var(--txt2);font-weight:400}
.al{padding:11px 14px;border-radius:10px;margin-bottom:12px;font-size:14px;line-height:1.55}
.aI{background:var(--blue-50);color:var(--blue-800);border-left:3px solid var(--blue-400)}
.aW{background:#FFF8E6;color:#7A4800;border-left:3px solid #F5A623}
.aG{background:#EAF6EE;color:#1E5C35;border-left:3px solid #3AAA5C}
.aR{background:#FEF0F0;color:#7A1F1F;border-left:3px solid #E05555}
.mr{padding:11px 0;border-top:1px solid var(--blue-50)}
.mr:first-child{border-top:none;padding-top:0}
.dr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--blue-50);font-size:14px}
.dr:last-child{border-bottom:none}
.dlbl{color:var(--txt2)}
.photo-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.photo-btn{padding:22px 10px;border:1.5px dashed var(--border2);border-radius:12px;background:var(--blue-50);cursor:pointer;font-family:inherit;color:var(--txt2);text-align:center;font-size:13px;display:flex;flex-direction:column;align-items:center;gap:7px;-webkit-tap-highlight-color:transparent;transition:background .15s}
.photo-btn:active{background:var(--blue-100)}
.photo-btn-icon{font-size:28px;line-height:1}
.mimg{width:100%;height:180px;object-fit:cover;border-radius:10px;margin-bottom:8px}
.mg4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
.mbox{text-align:center;background:var(--sc-bg);border-radius:9px;padding:9px 4px}
.eg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.ef label{font-size:12px;color:var(--txt2);display:block;margin-bottom:3px}
.ef input{padding:7px 9px;font-size:14px}
.hday{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:10px}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.tG{background:#EAF6EE;color:#1E5C35}
.tA{background:#FFF8E6;color:#7A4800}
.tR{background:#FEF0F0;color:#7A1F1F}
.spinw{display:flex;align-items:center;gap:10px;color:var(--txt2);font-size:14px;padding:18px}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue-500);border-radius:50%;animation:rot .8s linear infinite;flex-shrink:0}
@keyframes rot{to{transform:rotate(360deg)}}
.emp{text-align:center;padding:40px 16px;color:var(--txt2)}
.sug{border-left:3px solid var(--blue-400);padding:8px 12px;font-size:13px;color:var(--txt2);margin-top:10px;line-height:1.55}
.em{font-size:13px;color:#c62828;margin-top:8px;text-align:center}
a{color:var(--blue-600)}

/* Stepper widget */
.stepper{display:flex;align-items:center;gap:0;border:1px solid var(--border2);border-radius:10px;overflow:hidden;height:42px}
.step-btn{width:46px;height:100%;border:none;background:var(--blue-50);font-size:22px;font-weight:300;color:var(--blue-600);cursor:pointer;flex-shrink:0;font-family:inherit;transition:background .12s;display:flex;align-items:center;justify-content:center}
.step-btn:active{background:var(--blue-100)}
.step-val{flex:1;text-align:center;font-size:17px;font-weight:600;color:var(--txt);background:var(--surface)}
.step-unit{font-size:12px;font-weight:400;color:var(--txt2);margin-left:2px}

/* Header hero */
.hero{background:linear-gradient(150deg,var(--blue-500) 0%,var(--blue-600) 100%);border-radius:16px;padding:18px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.08)}

/* Edit inline */
.edit-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--blue-50);font-size:14px}
.edit-row:last-child{border-bottom:none}
.edit-btn{padding:4px 11px;border:1px solid var(--border2);border-radius:7px;background:transparent;font-size:12px;color:var(--blue-600);cursor:pointer;font-family:inherit}
.edit-btn:active{background:var(--blue-50)}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0D1E2A;--surface:#132534;--border:#1E3A50;--border2:#265570;
    --txt:#C8E8F5;--txt2:#7AAFC4;--txt3:#4A7A94;
    --card-bg:#132534;--sc-bg:#0F2030;--ring-track:#1E3A50;
    --blue-50:#0A1826;--blue-100:#0F2438;
  }
  .bP{background:linear-gradient(135deg,#3E9EC7,#2980B9)}
  .aI{background:#0A1D2E;color:#A0D4EC;border-left-color:#5BAFD6}
  .aW{background:#1E1200;color:#F5C97A;border-left-color:#C8870A}
  .aG{background:#0A1E10;color:#7DC89A;border-left-color:#2A8A4E}
  .aR{background:#1E0A0A;color:#E09090;border-left-color:#B03030}
  .tG{background:#0A1E10;color:#7DC89A}
  .tA{background:#1E1200;color:#F5C97A}
  .tR{background:#1E0A0A;color:#E09090}
  input,select,textarea{background:#0F2030;border-color:#265570;color:#C8E8F5}
  .step-btn{background:#0F2030;color:#5BAFD6}
  .step-btn:active{background:#1E3A50}
  .step-val{background:#132534}
  .photo-btn{background:#0A1826;border-color:#265570}
  .photo-btn:active{background:#0F2438}
}
</style>
</head>
<body>
<div id="app">

<!-- SETUP -->
<div id="view-setup" class="view active" style="padding-top:28px">
  <div style="margin-bottom:22px">
    <div style="font-size:44px;margin-bottom:10px">🥗</div>
    <h1 style="font-size:24px;font-weight:700;color:var(--blue-600);margin-bottom:6px">健康飲食追蹤</h1>
    <p style="font-size:14px;color:var(--txt2);line-height:1.65">填寫基本資料，系統將計算您的每日熱量、TDEE 與營養素目標，並透過 AI 辨識食物熱量</p>
  </div>

  <div class="card">
    <div class="slbl">基本資料</div>
    <div class="r2">
      <div class="fg"><label>性別</label>
        <select id="s-g"><option value="m">男性</option><option value="f">女性</option></select></div>
      <div class="fg"><label>年齡（歲）</label><input type="number" id="s-a" placeholder="25" min="10" max="100"></div>
    </div>
    <div class="r2">
      <div class="fg"><label>身高（cm）</label><input type="number" id="s-h" placeholder="170" min="100" max="250"></div>
      <div class="fg" style="margin-bottom:0"><label>目前體重（kg）</label><input type="number" id="s-w" placeholder="70" min="30" max="300" step="0.1"></div>
    </div>
  </div>

  <div class="card">
    <div class="slbl">目標設定</div>
    <div class="fg"><label>一週運動幾次</label>
      <select id="s-ex">
        <option value="0">幾乎不運動（辦公桌族）</option>
        <option value="1">1 次（偶爾輕度活動）</option>
        <option value="2">2 次</option>
        <option value="3">3 次（一般活躍）</option>
        <option value="4">4 次</option>
        <option value="5">5 次（高強度訓練）</option>
        <option value="6">6 次</option>
        <option value="7">每天運動</option>
      </select>
    </div>
    <div class="r2">
      <div class="fg"><label>目標體重（kg）</label><input type="number" id="s-gw" placeholder="65" min="30" max="300" step="0.1"></div>
      <div class="fg" style="margin-bottom:0"><label>達成目標日期</label><input type="date" id="s-td"></div>
    </div>
  </div>

  <div class="card">
    <div class="slbl">AI 食物辨識設定（選填）</div>
    <div class="fg" style="margin-bottom:8px"><label>Gemini API Key</label>
      <input type="password" id="s-ak" placeholder="AIza...（不填可手動輸入）"></div>
    <p style="font-size:12px;color:var(--txt2);line-height:1.65">免費申請：<a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>（每天有免費額度）</p>
  </div>

  <button class="btn bP" onclick="doSetup()">開始追蹤 →</button>
  <p id="serr" class="em"></p>
</div>

<!-- TAB BAR -->
<div id="tabs" style="display:none">
  <button class="tb on" id="t-dashboard" onclick="goTo('dashboard')"><span class="ti">🏠</span>主頁</button>
  <button class="tb" id="t-add" onclick="goTo('add')"><span class="ti">➕</span>新增</button>
  <button class="tb" id="t-history" onclick="goTo('history')"><span class="ti">📋</span>紀錄</button>
  <button class="tb" id="t-profile" onclick="goTo('profile')"><span class="ti">👤</span>設定</button>
</div>

<!-- DASHBOARD -->
<div id="view-dashboard" class="view"><div id="db"></div></div>

<!-- ADD MEAL -->
<div id="view-add" class="view">
  <h1 style="font-size:20px;font-weight:700;margin-bottom:4px;color:var(--blue-600)">新增餐點</h1>
  <p style="font-size:14px;color:var(--txt2);margin-bottom:16px">上傳食物照片或輸入描述，AI 自動分析熱量與營養素</p>
  <input type="file" id="pi-cam" accept="image/*" capture="environment" style="display:none" onchange="onPhoto(this)">
  <input type="file" id="pi-lib" accept="image/*" style="display:none" onchange="onPhoto(this)">
  <div id="pa">
    <div class="photo-btns">
      <button class="photo-btn" onclick="document.getElementById('pi-cam').click()">
        <span class="photo-btn-icon">📷</span><span>開啟相機拍攝</span>
      </button>
      <button class="photo-btn" onclick="document.getElementById('pi-lib').click()">
        <span class="photo-btn-icon">🖼️</span><span>從相簿選擇</span>
      </button>
    </div>
  </div>
  <div class="card">
    <div class="fg" style="margin-bottom:0">
      <label>食物描述（輔助 AI 更準確辨識）</label>
      <textarea id="mn" rows="3" placeholder="例如：一碗白飯約 250g，兩塊去皮雞腿肉，一碟燙青菜..."></textarea>
    </div>
  </div>
  <button class="btn bP" id="abtn" onclick="doAnalyze()">AI 分析熱量</button>
  <div id="ast"></div>
  <div id="ar"></div>
</div>

<!-- HISTORY -->
<div id="view-history" class="view">
  <h1 style="font-size:20px;font-weight:700;margin-bottom:16px;color:var(--blue-600)">飲食紀錄</h1>
  <div id="hc"></div>
</div>

<!-- PROFILE -->
<div id="view-profile" class="view">
  <h1 style="font-size:20px;font-weight:700;margin-bottom:16px;color:var(--blue-600)">個人設定</h1>
  <div id="pc"></div>
</div>

</div>

<script>
let P=null, TM=[], AD=null, PB=null, PM=null;
const PK='nut-profile3', WK='nut-wlog3';
const tday=()=>new Date().toISOString().slice(0,10);
const mk=d=>'nut-meals3-'+(d||tday());
const mk2=d=>'nut-track3-'+(d||tday());

function sg(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function sgT(){return sg(mk2())||{steps:0,water:0};}
function ssT(t){ss(mk2(),t);}

function calcM(p){
  const w=+p.w,h=+p.h,a=+p.a,ex=+p.ex;
  const bmr=p.g==='m'?10*w+6.25*h-5*a+5:10*w+6.25*h-5*a-161;
  const am=[1.2,1.375,1.375,1.55,1.55,1.725,1.725,1.9];
  const tdee=Math.round(bmr*am[Math.min(ex,7)]);
  const days=Math.max(1,(new Date(p.td)-new Date())/86400000);
  const def=Math.min(Math.max(((+p.w-+p.gw)*7700)/days,-500),1000);
  let cal=Math.round(tdee-def);
  cal=Math.max(cal,p.g==='m'?1500:1200);
  const pro=Math.round(w*1.8);
  const fat=Math.round(cal*.25/9);
  const carb=Math.max(Math.round((cal-pro*4-fat*9)/4),50);
  return{
    bmr:Math.round(bmr),tdee,cal,
    pro:Math.max(pro,50),fat:Math.max(fat,20),carb,
    fib:p.g==='m'?30:25,
    H2O:Math.round(w*35/100)*100,
    steps:Math.min(8000+ex*300,12000)
  };
}

function sum(ms){return ms.reduce((a,m)=>({c:a.c+(+m.c||0),cb:a.cb+(+m.cb||0),pr:a.pr+(+m.pr||0),ft:a.ft+(+m.ft||0),fi:a.fi+(+m.fi||0)}),{c:0,cb:0,pr:0,ft:0,fi:0});}
function pbH(pct,col){return`<div class="pb"><div class="pf" style="width:${Math.min(Math.round(pct*100),100)}%;background:${col}"></div></div>`;}

function stepAdj(field,delta){
  const t=sgT();
  if(field==='steps')t.steps=Math.max(0,t.steps+delta);
  if(field==='water')t.water=Math.max(0,t.water+delta);
  ssT(t);
  document.getElementById('sv-steps').textContent=t.steps.toLocaleString();
  document.getElementById('sv-water').textContent=t.water;
  const m=calcM(P);
  const sp=Math.min(t.steps/m.steps,1),wp=Math.min(t.water/m.H2O,1);
  document.getElementById('pb-steps').style.width=Math.round(sp*100)+'%';
  document.getElementById('pb-water').style.width=Math.round(wp*100)+'%';
}

function rdDb(){
  if(!P)return;
  const m=calcM(P),s=sum(TM),t=sgT();
  const rem=m.tdee-s.c;   // vs TDEE
  const calRem=m.cal-s.c; // vs target (for suggestion)
  const cp=s.c/m.tdee;
  const R=52,circ=2*Math.PI*R,off=circ*(1-Math.min(Math.max(cp,0),1));
  const rc=cp>1.05?'#E24B4A':cp>.85?'#3AAA5C':'#5BAFD6';
  const hr=new Date().getHours();
  const gr=hr<5?'深夜好':hr<12?'早安':hr<18?'午安':'晚安';
  const dl=new Date().toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'});
  const ds=P.lwc?Math.floor((new Date()-new Date(P.lwc))/86400000):Math.floor((new Date()-new Date(P.sd))/86400000);
  const wb=ds>=14?`<div class="al aW" style="cursor:pointer" onclick="showWU()">📊 已追蹤 ${ds} 天，點此更新體重以優化目標 →</div>`:'';

  let sug='';
  if(!TM.length)sug=`<div class="al aI">今天還沒記錄任何餐點，點「➕ 新增」開始追蹤！</div>`;
  else if(calRem>300)sug=`<div class="al aI">距今日攝取目標還差 ${Math.round(calRem)} 大卡，建議補充蛋白質與蔬菜</div>`;
  else if(calRem<-200)sug=`<div class="al aW">已超出每日目標 ${Math.round(-calRem)} 大卡，建議今晚清淡飲食</div>`;
  else sug=`<div class="al aG">今日攝取接近目標，繼續保持！記得補充水分 💧</div>`;

  const macs=[
    {n:'碳水',e:s.cb,g:m.carb,c:'#5BAFD6'},
    {n:'蛋白質',e:s.pr,g:m.pro,c:'#3AAA5C'},
    {n:'脂肪',e:s.ft,g:m.fat,c:'#F5A623'},
    {n:'纖維',e:s.fi,g:m.fib,c:'#7B68EE'}
  ];

  const sp=Math.min(t.steps/m.steps,1),wp=Math.min(t.water/m.H2O,1);

  const msH=!TM.length
    ?`<div class="emp"><div style="font-size:36px">🍽️</div><p style="font-size:14px;margin-top:8px">今天還沒有記錄餐點</p></div>`
    :TM.map(ml=>`<div class="mr">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <span style="font-size:15px;font-weight:600">${ml.n}</span>
        <span style="font-size:15px;color:var(--blue-600);font-weight:600">${Math.round(ml.c)} kcal</span>
      </div>
      <div style="font-size:12px;color:var(--txt2);margin-top:3px">碳水 ${Math.round(ml.cb)}g・蛋白 ${Math.round(ml.pr)}g・脂肪 ${Math.round(ml.ft)}g・纖維 ${Math.round(ml.fi)}g</div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span style="font-size:11px;color:var(--txt3)">${ml.t}</span>
        <button onclick="tryDel('${ml.id}')" id="db${ml.id}" style="font-size:12px;color:var(--txt2);border:none;background:none;cursor:pointer;padding:0;font-family:inherit">刪除</button>
      </div>
    </div>`).join('');

  document.getElementById('db').innerHTML=`
    ${wb}
    <div class="hero">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <div>
          <p style="font-size:12px;opacity:.75">${dl}</p>
          <h2 style="font-size:20px;font-weight:700;margin-top:2px">${gr} 👋</h2>
        </div>
        <div style="text-align:right">
          <p style="font-size:11px;opacity:.7">每日目標攝取</p>
          <p style="font-size:18px;font-weight:700">${m.cal} <span style="font-size:12px;font-weight:400;opacity:.8">大卡</span></p>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:16px">
        <div style="position:relative;width:128px;height:128px;flex-shrink:0">
          <svg width="128" height="128" viewBox="0 0 128 128">
            <circle cx="64" cy="64" r="${R}" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="13"/>
            <circle cx="64" cy="64" r="${R}" fill="none" stroke="${rc}" stroke-width="13"
              stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
              stroke-linecap="round" transform="rotate(-90 64 64)"/>
          </svg>

function doWU(){
  const v=parseFloat(document.getElementById('nwi')?.value);
  if(!v||v<30||v>300)return;
  let wl=sg(WK)||[];wl.push({d:tday(),w:v});ss(WK,wl);
  const prev=+P.w;P.w=v;P.lwc=tday();ss(PK,P);rdDb();
  const diff=prev-v;
  if(Math.abs(diff)>=0.1){
    setTimeout(()=>{
      const msg=diff>0?`太棒了！已減輕 ${diff.toFixed(1)} kg 🎉 已更新目標`:`體重更新 ${Math.abs(diff).toFixed(1)} kg，繼續加油！`;
      document.getElementById('db').insertAdjacentHTML('afterbegin',`<div class="al aG" id="ws">${msg}</div>`);
      setTimeout(()=>document.getElementById('ws')?.remove(),5000);
    },200);
  }
}

async function doAnalyze(){
  const notes=document.getElementById('mn').value.trim();
  if(!PB&&!notes)return;
  const ab=document.getElementById('abtn');ab.disabled=true;ab.textContent='分析中...';
  document.getElementById('ast').innerHTML='<div class="spinw"><div class="spin"></div>AI 正在分析食物熱量...</div>';
  document.getElementById('ar').innerHTML='';
  if(!P?.ak){document.getElementById('ast').innerHTML='';mnEntry(notes||'未知食物');ab.disabled=false;ab.textContent='AI 分析熱量';return;}
  try{
    const prompt=`你是精準的營養師。請分析${PB?'這張食物照片':''}${notes?`與描述："${notes}"`:''}。給合理單一數值（非範圍），只回覆純JSON（不含markdown）：{"foodName":"中文名稱","servingSize":"份量說明","totalCalories":整數,"carbs":整數,"protein":整數,"fat":整數,"fiber":整數,"suggestion":"一句體重管理建議"}`;
    const parts=[];
    if(PB)parts.push({inline_data:{mime_type:PM,data:PB}});
    parts.push({text:prompt});
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${P.ak}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts}]})});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const match=data.candidates[0].content.parts[0].text.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('AI 回應格式錯誤');
    AD=JSON.parse(match[0]);
    document.getElementById('ast').innerHTML='';showResult();
  }catch(err){
    document.getElementById('ast').innerHTML=`<div class="al aW">分析失敗：${err.message}</div>`;
    mnEntry(notes||'未知食物');
  }
  ab.disabled=false;ab.textContent='AI 分析熱量';
}

function rdHist(){
  const el=document.getElementById('hc');
  el.innerHTML='<div class="spinw"><div class="spin"></div>載入紀錄中...</div>';
  const m=P?calcM(P):null;
  const days=Array.from({length:14},(_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return d.toISOString().slice(0,10);});
  const res=days.map(d=>({d,ms:sg(mk(d))||[],tr:sg(mk2(d))||{steps:0,water:0}}));
  const fl=res.filter(r=>r.ms.length>0||r.tr.steps>0||r.tr.water>0);
  if(!fl.length){el.innerHTML='<div class="emp"><div style="font-size:36px">📋</div><p style="font-size:14px;margin-top:8px">還沒有任何飲食紀錄</p></div>';return;}
  el.innerHTML=fl.map(({d,ms,tr})=>{

          .map(it=>`<div><div style="font-size:15px;font-weight:600">${it.v}</div><div style="font-size:11px;color:var(--txt2)">${it.l}<br>${it.u}</div></div>`).join('')}

        <p style="font-weight:600;margin-bottom:8px">確定要重置所有資料？此操作無法復原。</p>
        <button onclick="doRst()" style="padding:8px 16px;background:#E05555;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit;margin-right:8px">確定刪除</button>
        <button onclick="document.getElementById('rst-c').style.display='none';document.querySelector('#rst-wrap .bS').style.display='block'" style="padding:8px 16px;border:none;background:none;color:var(--txt2);cursor:pointer;font-size:14px;font-family:inherit">取消</button>
      </div>
    </div>`;
}

function toggleEditProfile(){
  const v=document.getElementById('profile-view'),f=document.getElementById('profile-form');
  v.style.display=v.style.display==='none'?'block':'none';
  f.style.display=f.style.display==='none'?'block':'none';
}
function toggleEditApi(){
  const v=document.getElementById('api-view'),f=document.getElementById('api-form');
  v.style.display=v.style.display==='none'?'block':'none';
  f.style.display=f.style.display==='none'?'block':'none';
}

function saveProfile(){
  const g=id=>document.getElementById(id)?.value;
  const nw={...P,g:g('pf-g'),a:+g('pf-a'),h:+g('pf-h'),w:+g('pf-w'),ex:+g('pf-ex'),gw:+g('pf-gw'),td:g('pf-td')};
  if(!nw.a||!nw.h||!nw.w||!nw.gw||!nw.td)return;
  P=nw;ss(PK,P);rdProf();
}

function saveApi(){
  const k=document.getElementById('ak-inp')?.value.trim();
  P.ak=k;ss(PK,P);rdProf();
}

function doRst(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('nut-'));
  keys.forEach(k=>localStorage.removeItem(k));
  P=null;TM=[];
  document.getElementById('tabs').style.display='none';
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-setup').classList.add('active');
}

function doSetup(){
  const g=document.getElementById('s-g').value;
  const a=+document.getElementById('s-a').value;
  const h=+document.getElementById('s-h').value;
  const w=+document.getElementById('s-w').value;
  const ex=+document.getElementById('s-ex').value;
  const gw=+document.getElementById('s-gw').value;
  const td=document.getElementById('s-td').value;
  const ak=document.getElementById('s-ak').value.trim();
  const err=document.getElementById('serr');
  if(!a||!h||!w||!gw||!td){err.textContent='請填寫所有必填欄位';return;}
  if(a<10||a>100){err.textContent='年齡請填 10–100';return;}
  if(h<100||h>250){err.textContent='身高請填 100–250 cm';return;}
  if(w<30||w>300){err.textContent='體重請填 30–300 kg';return;}
  if(new Date(td)<=new Date()){err.textContent='目標日期請設定在未來';return;}
  P={g,a,h,w,ex,gw,td,ak,sd:tday(),lwc:null};
  ss(PK,P);TM=[];
  document.getElementById('view-setup').classList.remove('active');
  document.getElementById('tabs').style.display='flex';
  goTo('dashboard');
}

function init(){
  P=sg(PK);
  if(P){TM=sg(mk())||[];document.getElementById('tabs').style.display='flex';document.getElementById('view-setup').classList.remove('active');goTo('dashboard');}
}
init();
</script>
</body>
</html>
